<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Clientes</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; display: flex; min-height: 100vh; background: #f0f2f5; }

    .sidebar {
      width: 200px; background: #1a1a2e; color: white;
      display: flex; flex-direction: column; padding: 20px 0; min-height: 100vh;
    }
    .sidebar .logo {
      padding: 0 20px 24px; font-size: 13px; color: #aaa;
      border-bottom: 1px solid #333; margin-bottom: 16px;
    }
    .sidebar .logo span { display: block; font-size: 11px; color: #666; margin-top: 2px; }
    .sidebar a {
      display: block; padding: 12px 20px; color: #ccc;
      text-decoration: none; font-size: 14px; transition: background 0.2s;
    }
    .sidebar a:hover { background: #2a2a4a; color: white; }
    .sidebar a.active { background: #4f6ef7; color: white; }

    .main { flex: 1; padding: 30px; }
    .main h2 { font-size: 20px; color: #1a1a2e; margin-bottom: 24px; }

    .card {
      background: white; border-radius: 12px; padding: 30px;
      max-width: 500px; box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .field { margin-bottom: 18px; }
    .field label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 6px; }
    .field input {
      width: 100%; padding: 11px 14px; border: 1px solid #ddd;
      border-radius: 8px; font-size: 14px; outline: none; transition: border 0.2s;
    }
    .field input:focus { border-color: #4f6ef7; }
    .btn {
      width: 100%; padding: 13px; background: #4f6ef7; color: white;
      border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
      cursor: pointer; margin-top: 8px; transition: background 0.2s;
    }
    .btn:hover { background: #3a5bd9; }
    .msg { margin-top: 12px; font-size: 13px; color: red; text-align: center; }
    .msg.ok { color: green; }
  </style>
</head>
<body>
  <script>
  if (!localStorage.getItem('token')) {
    window.location.href = 'index.html';
  }
</script>

  <div class="sidebar">
    <div class="logo">
      🅿️ Estacionamento<br>Central Park
      <span>Sistema de Gestão</span>
    </div>
    <a href="dashboard.html">🅿 Vagas</a>
    <a href="cadastro-veiculo.html">🚗 Cadastro de veículo</a>
    <a href="cadastro-cliente.html" class="active">👤 Cadastro de clientes</a>
    <a href="usuario.html">⚙️ Usuário</a>
  </div>

  <div class="main">
    <h2>Cadastro de Clientes</h2>
    <div class="card">
      <div class="field">
        <label>Nome completo</label>
        <input type="text" id="nome" placeholder="Ex: João Silva">
      </div>
      <div class="field">
        <label>CPF</label>
        <input type="text" id="cpf" placeholder="Ex: 000.000.000-00" maxlength="14">
      </div>
      <div class="field">
        <label>Telefone</label>
        <input type="text" id="telefone" placeholder="Ex: (11) 99999-9999" maxlength="15">
      </div>
      <div class="field">
        <label>E-mail</label>
        <input type="email" id="email" placeholder="Ex: joao@email.com">
      </div>
      <button class="btn" onclick="salvar()">Salvar Cliente</button>
      <div class="msg" id="msg"></div>
    </div>

    <h3 style="margin: 24px 0 16px; color:#1a1a2e;">Clientes cadastrados</h3>
    <table style="width:100%; border-collapse:collapse; background:white; border-radius:12px; overflow:hidden; box-shadow:0 2px 12px rgba(0,0,0,0.08);">
      <thead>
        <tr>
          <th style="background:#1a1a2e; color:white; padding:12px 16px; text-align:left; font-size:13px;">Nome</th>
          <th style="background:#1a1a2e; color:white; padding:12px 16px; text-align:left; font-size:13px;">CPF</th>
          <th style="background:#1a1a2e; color:white; padding:12px 16px; text-align:left; font-size:13px;">Telefone</th>
          <th style="background:#1a1a2e; color:white; padding:12px 16px; text-align:left; font-size:13px;">E-mail</th>
          <th style="background:#1a1a2e; color:white; padding:12px 16px; text-align:left; font-size:13px;">Ação</th>
        </tr>
      </thead>
      <tbody id="tabela"></tbody>
    </table>
  </div>

  <script>
    async function salvar() {
      const nome = document.getElementById('nome').value.trim();
      const cpf = document.getElementById('cpf').value.trim();
      const telefone = document.getElementById('telefone').value.trim();
      const email = document.getElementById('email').value.trim();
      const msg = document.getElementById('msg');

      if (!nome) { msg.className = 'msg'; msg.textContent = 'Informe o nome.'; return; }
      if (!cpf) { msg.className = 'msg'; msg.textContent = 'Informe o CPF.'; return; }
      if (!telefone) { msg.className = 'msg'; msg.textContent = 'Informe o telefone.'; return; }
      if (!email) { msg.className = 'msg'; msg.textContent = 'Informe o e-mail.'; return; }

      const token = localStorage.getItem('token');
      const res = await fetch('/api/Cliente', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ nome, cpf, telefone, email })
      });

      if (res.ok) {
        msg.className = 'msg ok';
        msg.textContent = '✅ Cliente cadastrado com sucesso!';
        document.getElementById('nome').value = '';
        document.getElementById('cpf').value = '';
        document.getElementById('telefone').value = '';
        document.getElementById('email').value = '';
        carregarClientes();
      } else {
        const erro = await res.text();
        msg.className = 'msg';
        msg.textContent = erro;
      }
    }

    async function carregarClientes() {
      const token = localStorage.getItem('token');
      const res = await fetch('/api/Cliente', {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (!res.ok) return;
      const clientes = await res.json();
      const tabela = document.getElementById('tabela');
      tabela.innerHTML = '';
      clientes.forEach(c => {
        tabela.innerHTML += `
          <tr>
            <td style="padding:12px 16px; border-bottom:1px solid #f0f0f0;">${c.nome}</td>
            <td style="padding:12px 16px; border-bottom:1px solid #f0f0f0;">${c.cpf}</td>
            <td style="padding:12px 16px; border-bottom:1px solid #f0f0f0;">${c.telefone}</td>
            <td style="padding:12px 16px; border-bottom:1px solid #f0f0f0;">${c.email}</td>
            <td style="padding:12px 16px; border-bottom:1px solid #f0f0f0;">
              <button onclick="excluir(${c.id})" style="padding:6px 14px; background:#e74c3c; color:white; border:none; border-radius:6px; cursor:pointer;">🗑 Excluir</button>
            </td>
          </tr>`;
      });
    }

    async function excluir(id) {
      if (!confirm('Deseja excluir este cliente?')) return;
      const token = localStorage.getItem('token');
      await fetch(`/api/Cliente/${id}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${token}` }
      });
      carregarClientes();
    }

    carregarClientes();
  </script>
</body>
</html>
