<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relatório</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; display: flex; min-height: 100vh; background: #f0f2f5; }

    .sidebar {
      width: 200px; background: #1a1a2e; color: white;
      display: flex; flex-direction: column; padding: 20px 0; min-height: 100vh;
    }
    .sidebar .logo {
      padding: 0 20px 24px; font-size: 13px; color: #aaa;
      border-bottom: 1px solid #333; margin-bottom: 16px;
    }
    .sidebar .logo span { display: block; font-size: 11px; color: #666; margin-top: 2px; }
    .sidebar a {
      display: block; padding: 12px 20px; color: #ccc;
      text-decoration: none; font-size: 14px; transition: background 0.2s;
    }
    .sidebar a:hover { background: #2a2a4a; color: white; }
    .sidebar a.active { background: #4f6ef7; color: white; }

    .main { flex: 1; padding: 30px; }
    .main h2 { font-size: 20px; color: #1a1a2e; margin-bottom: 24px; }

    .cards-topo { display: flex; gap: 16px; margin-bottom: 24px; }
    .card-info {
      background: white; border-radius: 12px; padding: 20px 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08); flex: 1; text-align: center;
    }
    .card-info .num { font-size: 32px; font-weight: 700; color: #4f6ef7; }
    .card-info .label { font-size: 13px; color: #888; margin-top: 4px; }

    table { width: 100%; border-collapse: collapse; background: white;
      border-radius: 12px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    th { background: #1a1a2e; color: white; padding: 12px 16px; text-align: left; font-size: 13px; }
    td { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; font-size: 14px; color: #333; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f8f9ff; }

    .badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .badge.ativo { background: #ffe0e0; color: #e74c3c; }
    .badge.saiu { background: #e0ffe8; color: #27ae60; }
  </style>
</head>
<body>
  <script>
  if (!localStorage.getItem('token')) {
    window.location.href = 'index.html';
  }
</script>

  <div class="sidebar">
    <div class="logo">
      🅿️ Estacionamento<br>Central Park
      <span>Sistema de Gestão</span>
    </div>
    <a href="dashboard.html">🅿 Vagas</a>
    <a href="cadastro-veiculo.html">🚗 Cadastro de veículo</a>
    <a href="cadastro-cliente.html">👤 Cadastro de clientes</a>
    <a href="relatorio.html" class="active">📊 Relatório</a>
    <a href="usuario.html">⚙️ Usuário</a>
  </div>

  <div class="main">
    <h2>📊 Relatório de Entradas e Saídas</h2>

    <div class="cards-topo">
      <div class="card-info">
        <div class="num" id="totalEntradas">—</div>
        <div class="label">Total de entradas</div>
      </div>
      <div class="card-info">
        <div class="num" id="totalSaidas">—</div>
        <div class="label">Total de saídas</div>
      </div>
      <div class="card-info">
        <div class="num" id="totalAtivas">—</div>
        <div class="label">Vagas ocupadas agora</div>
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th>Vaga</th>
          <th>Veículo</th>
          <th>Placa</th>
          <th>Cliente</th>
          <th>Entrada</th>
          <th>Saída</th>
          <th>Permanência</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="tabela"></tbody>
    </table>
  </div>

  <script>
    const token = localStorage.getItem('token');

    async function carregar() {
      const res = await fetch('/api/Ocupacao/historico', {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const historico = await res.json();

      const total = historico.length;
      const saidas = historico.filter(h => h.dataSaida).length;
      const ativas = historico.filter(h => !h.dataSaida).length;

      document.getElementById('totalEntradas').textContent = total;
      document.getElementById('totalSaidas').textContent = saidas;
      document.getElementById('totalAtivas').textContent = ativas;

      const tabela = document.getElementById('tabela');
      tabela.innerHTML = '';

      historico.forEach(h => {
        const entrada = new Date(h.dataEntrada).toLocaleString('pt-BR');
        const saida = h.dataSaida ? new Date(h.dataSaida).toLocaleString('pt-BR') : '—';
        const status = h.dataSaida
          ? '<span class="badge saiu">✅ Saiu</span>'
          : '<span class="badge ativo">🔴 Dentro</span>';
        const ico = h.veiculo?.tipo === 'Moto' ? '🏍️' : '🚗';

        const inicio = new Date(h.dataEntrada);
        const fim = h.dataSaida ? new Date(h.dataSaida) : new Date();
        const diffMin = Math.floor((fim - inicio) / 60000);
        const horas = Math.floor(diffMin / 60);
        const min = diffMin % 60;
        const permanencia = horas > 0 ? `${horas}h ${min}min` : `${min}min`;

        tabela.innerHTML += `
          <tr>
            <td><b>${h.numeroVaga}</b></td>
            <td>${ico} ${h.veiculo?.modelo || '—'}</td>
            <td>${h.veiculo?.placa || '—'}</td>
            <td>${h.cliente?.nome || '—'}</td>
            <td>${entrada}</td>
            <td>${saida}</td>
            <td>⏱ ${permanencia}</td>
            <td>${status}</td>
          </tr>`;
      });
    }

    carregar();
  </script>
</body>
</html>
